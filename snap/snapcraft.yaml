name: bentopdf
base: core24
version: '2.7.0'
summary: Convert bento layouts to PDF and Free Online PDF Tools
description: |
  BentoPDF is a free online PDF toolkit with 100+ tools.
  Merge, split, compress, convert PDFs - 100% browser-based.

grade: stable
confinement: strict

platforms:
  amd64:

apps:
  bentopdf:
    command: bin/start-server.sh
    daemon: simple
    plugs:
      - network
      - network-bind

parts:
  bentopdf-web:
    plugin: nil
    source: .
    build-packages:
      - nodejs
      - npm
    build-environment:
      - NODE_OPTIONS: '--max-old-space-size=3072'
    override-build: |
      npm install
      npm run build
      mkdir -p $CRAFT_PART_INSTALL/var/www/bentopdf
      cp -r dist/* $CRAFT_PART_INSTALL/var/www/bentopdf/

  node-runtime:
    plugin: nil
    build-packages:
      - curl
      - xz-utils
    override-build: |
      # Download the official Node.js binary — self-contained, no external deps.
      # Do NOT use the host's 'which node' (may resolve to a snap shim wrapper),
      # and do NOT use Ubuntu's apt nodejs (uses externalized builtins that crash in snaps).
      NODE_VERSION="v20.18.0"
      ARCH="linux-x64"
      TARBALL="node-${NODE_VERSION}-${ARCH}.tar.xz"
      echo "Downloading Node.js ${NODE_VERSION}..."
      curl -fsSL "https://nodejs.org/dist/${NODE_VERSION}/${TARBALL}" -o /tmp/${TARBALL}
      tar -xf /tmp/${TARBALL} -C /tmp
      mkdir -p $CRAFT_PART_INSTALL/usr/bin
      cp "/tmp/node-${NODE_VERSION}-${ARCH}/bin/node" $CRAFT_PART_INSTALL/usr/bin/node
      chmod +x $CRAFT_PART_INSTALL/usr/bin/node
      echo "Bundled: $($CRAFT_PART_INSTALL/usr/bin/node --version)"

  server-files:
    plugin: dump
    source: snap/local
    organize:
      server.js: bin/server.js
      start-server.sh: bin/start-server.sh
