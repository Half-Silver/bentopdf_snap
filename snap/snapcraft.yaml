name: bentopdf
base: core24
version: '2.7.0'
summary: Convert bento layouts to PDF and Free Online PDF Tools
description: |
  BentoPDF is a free online PDF toolkit with 100+ tools.
  Merge, split, compress, convert PDFs - 100% browser-based.

grade: stable
confinement: strict

platforms:
  amd64:

apps:
  bentopdf:
    command: bin/start-server.sh
    daemon: simple
    plugs:
      - network
      - network-bind

parts:
  bentopdf-web:
    plugin: nil
    source: .
    build-packages:
      - nodejs
      - npm
    build-environment:
      - NODE_OPTIONS: '--max-old-space-size=3072'
    override-build: |
      npm install
      npm run build
      mkdir -p $CRAFT_PART_INSTALL/var/www/bentopdf
      cp -r dist/* $CRAFT_PART_INSTALL/var/www/bentopdf/

  node-runtime:
    plugin: nil
    override-build: |
      # Use the host's self-contained node binary (v20 from nodesource/nvm),
      # NOT Ubuntu's apt nodejs which requires externalized builtins not in the snap.
      mkdir -p $CRAFT_PART_INSTALL/usr/bin
      NODE_BIN=$(which node)
      echo "Bundling node from: $NODE_BIN  ($(node --version))"
      cp "$NODE_BIN" $CRAFT_PART_INSTALL/usr/bin/node
      chmod +x $CRAFT_PART_INSTALL/usr/bin/node

  server-files:
    plugin: dump
    source: snap/local
    organize:
      server.js: bin/server.js
      start-server.sh: bin/start-server.sh
