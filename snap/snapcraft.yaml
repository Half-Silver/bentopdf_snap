name: bentopdf
base: core24
version: '2.7.0'
summary: Convert bento layouts to PDF and Free Online PDF Tools
description: |
  BentoPDF is a free online PDF toolkit with 100+ tools.
  Merge, split, compress, convert PDFs - 100% browser-based.

grade: stable
confinement: strict

platforms:
  amd64:

apps:
  bentopdf:
    command: bin/start-server.sh
    daemon: simple
    plugs:
      - network
      - network-bind

parts:
  bentopdf-web:
    plugin: nil
    source: .
    build-packages:
      - nodejs
      - npm
    build-environment:
      - NODE_OPTIONS: '--max-old-space-size=3072'
    override-build: |
      npm install
      npm run build
      mkdir -p $CRAFT_PART_INSTALL/var/www/bentopdf
      cp -r dist/* $CRAFT_PART_INSTALL/var/www/bentopdf/

  node-runtime:
    plugin: nil
    override-build: |
      # Find the real node binary, skipping snap shim wrappers.
      # Priority: nodesource (/usr/local/bin), nvm, apt (/usr/bin), fallback.
      NODE_BIN=""
      for candidate in /usr/local/bin/node /usr/bin/node /home/*/nvm/versions/node/*/bin/node; do
        if [ -x "$candidate" ] && file "$candidate" | grep -q "ELF"; then
          NODE_BIN="$candidate"
          break
        fi
      done
      if [ -z "$NODE_BIN" ]; then
        echo "ERROR: Could not find a real (non-snap) node binary!"
        echo "Candidates checked:"
        ls -la /usr/local/bin/node /usr/bin/node 2>&1 || true
        file /usr/local/bin/node /usr/bin/node 2>&1 || true
        exit 1
      fi
      echo "Found real node binary at: $NODE_BIN"
      echo "Version: $($NODE_BIN --version)"
      mkdir -p $CRAFT_PART_INSTALL/usr/bin
      cp "$NODE_BIN" $CRAFT_PART_INSTALL/usr/bin/node
      chmod +x $CRAFT_PART_INSTALL/usr/bin/node

  server-files:
    plugin: dump
    source: snap/local
    organize:
      server.js: bin/server.js
      start-server.sh: bin/start-server.sh
