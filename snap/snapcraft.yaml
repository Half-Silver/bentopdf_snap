name: bentopdf
base: core24
version: '2.7.0'
summary: Convert bento layouts to PDF and Free Online PDF Tools
description: |
  BentoPDF is a free online PDF toolkit with 100+ tools.
  Merge, split, compress, convert PDFs - 100% browser-based.

grade: stable
confinement: strict

platforms:
  amd64:

layout:
  /usr/share/nodejs:
    bind: $SNAP/usr/share/nodejs
  /usr/lib/nodejs:
    bind: $SNAP/usr/lib/nodejs

apps:
  bentopdf:
    command: bin/start-server.sh
    daemon: simple
    plugs:
      - network
      - network-bind

parts:
  bentopdf-web:
    plugin: nil
    source: .
    build-packages:
      - nodejs
      - npm
    build-environment:
      - NODE_OPTIONS: '--max-old-space-size=3072'
    override-build: |
      npm install
      npm run build
      mkdir -p $CRAFT_PART_INSTALL/var/www/bentopdf
      cp -r dist/* $CRAFT_PART_INSTALL/var/www/bentopdf/

  node-runtime:
    plugin: nil
    stage-packages:
      - nodejs

  server-files:
    plugin: dump
    source: snap/local
    organize:
      server.js: bin/server.js
      start-server.sh: bin/start-server.sh
